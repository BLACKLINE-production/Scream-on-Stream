<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SoS Overlay</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
      cursor: none;
    }
    .stage {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
    }
    .stage video {
      width: 100%; height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <div class="stage" id="stage"></div>
  <script type="module" src="/overlay.js"></script>
</body>
</html>
